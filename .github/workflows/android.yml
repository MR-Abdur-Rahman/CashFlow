name: Android APK

# Manual/reusable only — no longer builds on every push to main. Run it from the Actions tab
# (workflow_dispatch) or let release-apk.yml call it (workflow_call) after bumping the version.
on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the tip of main. When called by release-apk.yml this picks up the version bump it
          # just committed (a reusable workflow otherwise checks out the caller's pre-bump commit).
          ref: main
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build web assets
        run: bun run build
      - name: Capacitor sync (android)
        run: bunx cap sync android
      - name: Make gradlew executable
        run: chmod +x android/gradlew
      - name: Inject versionName + versionCode from version.json
        run: |
          V=$(node -p "const v=require('./version.json');v.major+'.'+v.minor+'.'+v.patch")
          # Play Store requires a strictly increasing versionCode. Derive it from the same
          # major.minor.patch so it can never drift out of sync with versionName.
          # 3-digit slots (×1000000 / ×1000) give headroom for up to 999 patches between releases.
          VC=$(node -p "const v=require('./version.json');v.major*1000000+v.minor*1000+v.patch")
          sed -i "s/versionName \"[^\"]*\"/versionName \"$V\"/" android/app/build.gradle
          sed -i "s/versionCode [0-9]*/versionCode $VC/" android/app/build.gradle
          echo "Injected versionName=$V versionCode=$VC"
      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: android
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cashflow-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

name: Version bump
on:
  push:
    branches: [main]
jobs:
  bump:
    if: ${{ !contains(github.event.head_commit.message, '[version-bump]') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump patch
        run: node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('version.json'));v.patch=(v.patch||0)+1;fs.writeFileSync('version.json',JSON.stringify(v)+'\n')"
      - name: Commit back
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git commit -m "chore: bump version [version-bump]"
          git push

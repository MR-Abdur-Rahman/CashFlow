name: Release APK (bump minor, reset patch + build)
# One-button release: bump the minor (second) digit + reset the patch (third) digit to 0, commit it,
# then build the APK by CALLING android.yml (workflow_call) in the same run — no duplicated build
# steps. The bump commit is tagged [version-bump] so version-bump.yml skips it; the patch counter
# resumes from 0 on the next normal push to main. android.yml no longer builds on push, so this run
# is the only APK build for the release.
on:
  workflow_dispatch:
jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump minor + reset patch (version.json + public/app-version.json)
        run: |
          node -e "
            const fs=require('fs');
            const v=JSON.parse(fs.readFileSync('version.json'));
            v.minor=(v.minor||0)+1; v.patch=0;
            fs.writeFileSync('version.json', JSON.stringify(v)+'\n');
            // Keep the 'latest version' the app checks against accurate (patch always 0 at release).
            const p='public/app-version.json';
            const a=JSON.parse(fs.readFileSync(p));
            a.version=v.major+'.'+v.minor+'.'+v.patch;
            fs.writeFileSync(p, JSON.stringify(a,null,2)+'\n');
          "
      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json public/app-version.json
          git commit -m "chore: release APK — bump minor, reset patch [version-bump]"
          git push

  # Runs after the bump; calls android.yml, which checks out the (now-bumped) tip of main and builds.
  build:
    needs: bump
    uses: ./.github/workflows/android.yml
